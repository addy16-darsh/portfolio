<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>About | Balagopal Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: 'Fira Code', 'Consolas', monospace;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .about-header {
      display: flex;
      align-items: center;
      padding: 1.2rem 2rem 0.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0,0,0,.85), rgba(0,0,0,.4));
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }
    .about-header .icon {
      font-size: 1.6rem;
      margin-right: 0.7rem;
      filter: drop-shadow(0 0 6px var(--cyan));
    }
    .about-header .title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .terminal-container {
      max-width: 720px;
      margin: 2.5rem auto 4rem auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 0 40px rgba(0, 255, 255, .10);
      padding: 0;
      position: relative;
      min-height: 420px;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .terminal-container:focus-within {
      box-shadow: 0 0 0 2px var(--cyan), 0 0 32px rgba(0, 255, 255, .18);
    }

    /* macOS-style title bar */
    .terminal-titlebar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
    }
    .terminal-titlebar span {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #28c840; }
    .terminal-titlebar .tbar-label {
      margin-left: 8px;
      font-size: .85rem;
      color: var(--muted);
      font-family: 'Fira Code', monospace;
    }

    .terminal-body {
      padding: 1.8rem 1.6rem 2rem;
      font-size: 1rem;
    }

    /* Typed lines */
    .typed-line {
      opacity: 0;
      animation: fadeInLine 0.5s forwards;
      transform: translateY(6px);
      margin-bottom: 0.55em;
      line-height: 1.6;
    }
    .typed-line.cmd  { color: var(--cyan);   font-weight: 600; }
    .typed-line.info { color: var(--text);   }
    .typed-line.muted-line { color: var(--muted); }
    .typed-line.comment { color: rgba(0, 255, 255, .5); font-style: italic; }
    .typed-line.blank { margin-bottom: 0.9em; }

    @keyframes fadeInLine {
      to { opacity: 1; transform: translateY(0); }
    }

    .typed-cursor {
      display: inline-block;
      width: 0.55ch;
      height: 1.1em;
      background: var(--cyan);
      vertical-align: text-bottom;
      animation: blink 1s steps(1) infinite;
      margin-left: 2px;
      border-radius: 1px;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* Back-to-top */
    .back-to-top {
      position: fixed;
      right: 2vw;
      bottom: 2vw;
      background: var(--panel);
      color: var(--cyan);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 48px; height: 48px;
      font-size: 1.4rem;
      box-shadow: 0 2px 16px rgba(0, 255, 255, .15);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.2s, box-shadow 0.2s;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-to-top.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .back-to-top:hover {
      background: var(--cyan);
      color: #001010;
      box-shadow: 0 0 20px rgba(0, 255, 255, .4);
      transform: scale(1.12);
    }

    @media (max-width: 700px) {
      .terminal-body { padding: 1.2rem 1rem 1.4rem; font-size: .95rem; }
      .about-header  { padding: 1rem 1rem 0.5rem; }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="particles"></canvas>

  <header class="about-header">
    <a class="back-btn" href="{{ url_for('index') }}" aria-label="Back to Home">← Back</a>
    <span class="icon" aria-hidden="true">💻</span>
    <span class="title">About Me</span>
  </header>

  <main>
    <div class="terminal-container" id="terminal-container" tabindex="0" aria-label="About Me terminal">
      <div class="terminal-titlebar">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
        <span class="tbar-label">balagopal ~ bash</span>
      </div>
      <div class="terminal-body" id="terminal-body">
        <!-- Lines typed here by JS -->
      </div>
    </div>
    <button class="back-to-top" id="backToTopBtn" aria-label="Back to Top">↑</button>
  </main>

  <script>
    // Lines pulled from Flask data via Jinja — falls back to static array if needed
    const name    = {{ data.name | tojson }};
    const intro   = {{ data.sections.intro | tojson }};
    const skills  = {{ data.sections.skills | tojson }};
    const journey = {{ data.sections.journey | tojson }};
    const personality = {{ data.sections.personality | tojson }};

    // Build lines dynamically from Flask data
    const lines = [
      { text: "$ whoami",                          cls: "cmd"     },
      { text: name + " — Python Developer & AI Enthusiast", cls: "info"  },
      { text: "",                                  cls: "blank"   },

      { text: "$ summary",                         cls: "cmd"     },
      ...intro.split('. ').slice(0, 4).map(s => ({ text: s.trim().replace(/\.$/, '') + '.', cls: "info" })),
      { text: "",                                  cls: "blank"   },

      { text: "$ skills",                          cls: "cmd"     },
      ...Object.entries(skills).map(([cat, items]) => ({
        text: cat + ": " + items.join(", "),
        cls: "muted-line"
      })),
      { text: "",                                  cls: "blank"   },

      { text: "$ journey",                         cls: "cmd"     },
      { text: journey.current_role.split('.')[0] + '.', cls: "info" },
      ...journey.past_experience.map(e => ({ text: "  • " + e.trim(), cls: "muted-line" })),
      { text: "",                                  cls: "blank"   },

      { text: "$ personality",                     cls: "cmd"     },
      { text: personality.intro,                   cls: "info"    },
      ...personality.items.map(i => ({ text: "  • " + i.split('–')[0].trim(), cls: "muted-line" })),
      { text: "",                                  cls: "blank"   },

      { text: "$ values",                          cls: "cmd"     },
      { text: "Karmanye Vadhikaraste — Focus on effort, not just results.", cls: "info" },
      { text: "Ethical behaviour, continuous learning, and meaningful connections.", cls: "muted-line" },
      { text: "",                                  cls: "blank"   },

      { text: "# This portfolio is not just a showcase of projects —", cls: "comment" },
      { text: "# it's a journey of curiosity, innovation, and the experiences that shaped me.", cls: "comment" },
    ];

    const body = document.getElementById('terminal-body');
    let lineIdx = 0;

    function typeLine(lineObj, callback) {
      const div = document.createElement('div');
      div.className = 'typed-line ' + lineObj.cls;
      body.appendChild(div);

      if (!lineObj.text) {
        // blank line — no typing needed
        setTimeout(callback, 80);
        return;
      }

      let charIdx = 0;
      function typeChar() {
        div.innerHTML = escapeHTML(lineObj.text.slice(0, charIdx))
          + '<span class="typed-cursor"></span>';
        charIdx++;
        if (charIdx <= lineObj.text.length) {
          setTimeout(typeChar, 18 + Math.random() * 22);
        } else {
          div.textContent = lineObj.text;
          callback();
        }
      }
      typeChar();
    }

    function escapeHTML(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function typeAllLines() {
      if (lineIdx < lines.length) {
        typeLine(lines[lineIdx], () => {
          lineIdx++;
          setTimeout(typeAllLines, 120);
        });
      }
    }

    window.addEventListener('load', () => {
      document.body.style.opacity = 0;
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.6s';
        document.body.style.opacity = 1;
        typeAllLines();
      }, 150);
    });

    // Back-to-top
    const backToTopBtn = document.getElementById('backToTopBtn');
    window.addEventListener('scroll', () => {
      backToTopBtn.classList.toggle('visible', window.scrollY > 300);
    });
    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>

  <script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
