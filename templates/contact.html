<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Balagopal Portfolio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body, html {
      height: 100%; margin: 0; padding: 0;
      background: var(--bg);
      font-family: 'Inter', Arial, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    #contact { max-width: 700px; padding: 2rem; }
    #contact p.muted { color: var(--muted); font-size: 1.05rem; margin-bottom: 2.2rem; }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="particles"></canvas>

  <section id="contact">
    <a class="back-btn" href="{{ url_for('index') }}">← Back to Home</a>
    <h2>Let's Connect</h2>
    <p class="muted">
      Looking forward to collaborating on impactful projects and exciting opportunities in
      Application Development, Software Engineering, or Machine Learning.
    </p>

    <div class="social-links">
      <a href="mailto:{{ socials.email }}" title="Email" aria-label="Send email">
        <i class="fas fa-envelope"></i>
      </a>
      <a href="{{ socials.linkedin }}" target="_blank" rel="noopener" title="LinkedIn" aria-label="LinkedIn profile">
        <i class="fab fa-linkedin-in"></i>
      </a>
      <a href="{{ socials.github }}" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub profile">
        <i class="fab fa-github"></i>
      </a>
      <a href="{{ socials.resume }}" download title="Download Résumé" aria-label="Download résumé PDF">
        <i class="fas fa-file-pdf"></i>
      </a>
    </div>
  </section>

  <script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
