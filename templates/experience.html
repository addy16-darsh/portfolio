<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experience | Balagopal Portfolio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem clamp(1rem, 4vw, 3rem); }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="particles"></canvas>

  <a class="back-btn" href="{{ url_for('index') }}">← Back to Home</a>
  <h2>Experience</h2>

  <div class="experience-grid">
    {% for exp in experiences %}
      <div class="exp-card">
        <div class="role">
          {{ exp.role }}
          <span class="type-badge">{{ exp.type }}</span>
        </div>
        <div class="company">{{ exp.company }}</div>
        <div class="meta">{{ exp.location }} &nbsp;·&nbsp; {{ exp.duration }}</div>
        <ul>
          {% for detail in exp.details %}
            <li>{{ detail }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endfor %}
  </div>

  <script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
