<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hobbies | Balagopal Portfolio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem clamp(1rem, 4vw, 3rem); }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="particles"></canvas>

  <a class="back-btn" href="{{ url_for('index') }}">← Back to Home</a>
  <h2>Hobbies &amp; Interests</h2>

  <div class="hobbies-grid">
    {% for h in hobbies %}
      <div class="hobby-card">
        <div class="hobby-icon" aria-hidden="true">{{ h.icon }}</div>
        <h3>{{ h.title }}</h3>
        <p>{{ h.desc }}</p>
      </div>
    {% endfor %}
  </div>

  <script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
