<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills | Balagopal Portfolio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem clamp(1rem, 4vw, 3rem); }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="particles"></canvas>

  <a class="back-btn" href="{{ url_for('index') }}">← Back to Home</a>
  <h2>My Skills</h2>

  <div class="skill-grid">
    {% for group in skills %}
      <div class="card">
        <h3>{{ group.category }}</h3>
        <ul class="skill-list">
          {% for skill in group.items %}
            <li>
              {{ skill.name }}
              <span class="proficiency">({{ skill.proficiency }})</span>
              <div class="bar">
                <div class="level" style="width: {{ skill.level }}%"></div>
              </div>
            </li>
          {% endfor %}
        </ul>
      </div>
    {% endfor %}
  </div>

  <script src="{{ url_for('static', filename='js/matrix.js') }}"></script>
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
